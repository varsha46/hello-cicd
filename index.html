<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Varsha CI/CD Project</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0d1b2a, #2196f3);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      color: #f57c00;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
      color: #f5f5f5;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
      margin-top: 30px;
      display: inline-block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #f57c00;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #ff9800;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 Hello Varsha</h1>
    <h1>🚀 Hello ALL</h1>
    <h2>CI/CD Pipeline Working Successfully</h2>

    <div class="card">
      <p>✔ Jenkins Integrated</p>
      <p>✔ GitHub Webhook Enabled</p>
      <p>✔ Auto Build Triggered</p>
      <p>✔ Live Deployment on VM</p>
    </div>

    <p>This project demonstrates a complete DevOps CI/CD pipeline</p>

    <button class="btn">🔥 Powered by Jenkins</button>
  </div>

</body>
</html>
