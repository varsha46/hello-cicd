<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glamour App</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0d1b2a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: #0d1b2a;
    }

    header h2 {
      color: #f57c00;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 16px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #0d1b2a, #2196f3);
    }

    .hero h1 {
      font-size: 48px;
    }

    .hero p {
      font-size: 18px;
      margin-top: 10px;
      color: #f5f5f5;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #f57c00;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 50px;
      flex-wrap: wrap;
    }

    .card {
      background: #1b263b;
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #0d1b2a;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h2>Glamour</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="hero">
  <h1>🚀 Welcome to Glamour</h1>
  <p>Your modern app powered by CI/CD</p>
  <button class="btn">Get Started</button>
</section>

<section class="features">
  <div class="card">
    <h3>⚡ Fast Deployment</h3>
    <p>Instant updates using Jenkins automation</p>
  </div>

  <div class="card">
    <h3>🔄 Auto CI/CD</h3>
    <p>Code push triggers automatic builds</p>
  </div>

  <div class="card">
    <h3>🌐 Live Hosting</h3>
    <p>Running on cloud VM with real-time updates</p>
  </div>
</section>

<footer>
  <p>Built by Varsha 💙 | Powered by Jenkins</p>
</footer>

</body>
</html>
